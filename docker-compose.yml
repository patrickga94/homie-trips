# Local development stack: Postgres + Django (auto-migrates) + Vite dev server.
# Usage: docker compose up  -> frontend at http://localhost:5173
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: trip
      POSTGRES_PASSWORD: trip
      POSTGRES_DB: trip_app
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trip"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    environment:
      SECRET_KEY: dev-insecure-change-me
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      CSRF_TRUSTED_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
      # Overrides backend/.env (real env vars win) so we point at the db service.
      DATABASE_URL: postgres://trip:trip@db:5432/trip_app
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    image: node:20-slim
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      # Vite proxies /api to the backend service inside the compose network.
      VITE_API_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata:
